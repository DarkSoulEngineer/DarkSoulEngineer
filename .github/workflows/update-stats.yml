name: Update Profile Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Fetch GitHub Stats
        id: stats
        run: |
          DATA=$(curl -s https://api.github.com/users/DarkSoulEngineer)
          echo "repos=$(echo $DATA | jq -r .public_repos)" >> $GITHUB_OUTPUT
          echo "followers=$(echo $DATA | jq -r .followers)" >> $GITHUB_OUTPUT
          echo "following=$(echo $DATA | jq -r .following)" >> $GITHUB_OUTPUT

      - name: Update README with current stats
        run: |
          REPOS=${{ steps.stats.outputs.repos }}
          FOLLOWERS=${{ steps.stats.outputs.followers }}
          FOLLOWING=${{ steps.stats.outputs.following }}

          # Update Repos badge
          sed -i "s|Repos-[0-9]*-2bbc8a|Repos-$REPOS-2bbc8a|g" README.md

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "update profile stats [skip ci]"
          git push
